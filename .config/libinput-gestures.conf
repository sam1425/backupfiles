# libinput-gestures configuration
# 3-finger swipe left -> Mango: Alt+Right (viewtoright)
# 3-finger swipe right -> Mango: Alt+Left (viewtoleft)
# Ensure libinput-gestures is installed and enabled (libinput-gestures-setup start)

gesture swipe left 3 xdotool key alt+Right
gesture swipe right 3 xdotool key alt+Left
